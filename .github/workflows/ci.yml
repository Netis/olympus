name: ci

# olympus's own CI — the framework eats its own dog food. Lints the shell,
# runs the stdlib tests for the triage composer, the argus observer, and the
# config loader, and runs the leakage gate on this repo itself.

on:
  push: { branches: [main] }
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck >/dev/null
          # Gate at warning+ (errors + warnings — real bugs). info/style nits in
          # the ported heron-origin linters are below threshold; .shellcheckrc
          # additionally silences SC1091 (dynamically-pathed sibling sources).
          shellcheck --severity=warning scripts/agent-bot/*.sh scripts/lib/*.sh scripts/lint/*.sh evals/*.sh

      - name: bash -n (syntax)
        run: for f in scripts/agent-bot/*.sh scripts/lib/*.sh scripts/lint/*.sh evals/*.sh; do bash -n "$f"; done

      - name: triage composer tests
        run: python3 scripts/agent-bot/tests/test_triage.py

      - name: argus observer tests
        run: python3 scripts/agent-bot/tests/test_argus.py

      - name: config loader tests
        run: python3 scripts/agent-bot/tests/test_config.py

      - name: harness adapter tests
        run: python3 scripts/agent-bot/tests/test_harness.py

      - name: soak classify/comment tests
        run: python3 scripts/agent-bot/tests/test_soak.py

      - name: eval bench check/score tests
        run: python3 evals/tests/test_checks.py

      - name: reviewer post-logic tests
        run: python3 scripts/pr-review/test_post_review.py

      - name: leakage gate (self)
        run: bash scripts/lint/check-leakage.sh

      - name: legacy-naming regression guard (rename to Olympus stays clean)
        run: bash scripts/lint/check-legacy-naming.sh
