name: self-implement

# olympus dogfooding its OWN implement surface (hephaestus) on its OWN issues, via
# a local reusable-workflow ref. DORMANT until `SELF_DOGFOOD_ENABLED == 'true'`
# AND secrets + a self-hosted runner are provisioned (see SELF-DOGFOOD.md).

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    if: ${{ vars.SELF_DOGFOOD_ENABLED == 'true' && github.event.label.name == 'agent:try' }}
    uses: ./.github/workflows/implement.yml
    with:
      olympus_repo: ${{ github.repository }}
      olympus_ref: ${{ github.sha }}
      runner_labels: '["self-hosted","olympus"]'
    secrets: inherit
