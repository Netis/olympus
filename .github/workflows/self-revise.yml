name: self-revise

# olympus dogfooding its OWN revise surface on its OWN PRs, via a local
# reusable-workflow ref. Dispatched by self-review's revise_dispatch step
# (`gh workflow run self-revise.yml`) — so to dogfood revise, set the
# OLYMPUS_REVISE_WORKFLOW env to `self-revise.yml` on the runner, or accept
# the default `pr-revise.yml` and rename this file. DORMANT until
# `SELF_DOGFOOD_ENABLED == 'true'` AND secrets + a self-hosted runner are
# provisioned (see SELF-DOGFOOD.md).

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to revise
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  revise:
    if: ${{ vars.SELF_DOGFOOD_ENABLED == 'true' }}
    uses: ./.github/workflows/revise.yml
    with:
      olympus_repo: ${{ github.repository }}
      olympus_ref: ${{ github.sha }}
      pr_number: ${{ inputs.pr_number }}
      runner_labels: '["self-hosted","olympus"]'
    secrets: inherit
