name: pr-soak
# Dispatched by the review workflow when an APPROVED PR is too big for the
# auto-merge fast path: it deploys the PR to your testing environment, soaks it
# for .testing.soak_minutes, then labels it staging-soaked (you merge) or
# soak-failed. The file MUST be named pr-soak.yml (auto_merge.sh / post_review.py
# dispatch that workflow name) unless you set OLYMPUS_SOAK_WORKFLOW.
#
# Requires .testing.enabled + .testing.deploy_cmd in your .olympus.json, the
# staging-soaked / soak-failed labels (auto-created on first use), and a runner
# that can reach your testing environment.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to soak
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  soak:
    uses: Netis/olympus/.github/workflows/soak.yml@v0.5.0
    with:
      pr_number: ${{ inputs.pr_number }}
      olympus_ref: v0.5.0
      runner_labels: '["self-hosted","my-runner"]'
      # Must exceed .testing.soak_minutes.
      timeout_minutes: 60
    secrets: inherit          # AGENT_GH_TOKEN
