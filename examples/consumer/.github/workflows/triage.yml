name: triage
# Drop this into a consuming repo at .github/workflows/triage.yml.
# Pin @vX.Y.Z (and olympus_ref) to the same olympus release.

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    uses: Netis/olympus/.github/workflows/triage.yml@v0.2.0
    with:
      olympus_ref: v0.2.0
      runner_labels: '["self-hosted","my-runner"]'
    secrets: inherit          # LITELLM_BASE_URL/API_KEY/NO_PROXY + AGENT_GH_TOKEN
