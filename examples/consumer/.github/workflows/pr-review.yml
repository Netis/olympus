name: pr-review
# Reviews a PR after the consumer's own `ci` workflow succeeds on it.
# Requires a workflow named `ci` in this repo (the review fires off its
# completion). Adjust `workflows: [ci]` if yours is named differently.

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: read

jobs:
  review:
    uses: Netis/olympus/.github/workflows/review.yml@v0.2.0
    with:
      olympus_ref: v0.2.0
      runner_labels: '["self-hosted","my-runner"]'
      # Empty string on the workflow_run path (resolved from the run event);
      # the PR number you typed on a manual workflow_dispatch re-review.
      pr_number: ${{ inputs.pr_number }}
    secrets: inherit
