name: guard
# Hygiene gate on every PR + push. No LLM, no self-hosted runner.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  guard:
    uses: Netis/agent-ops/.github/workflows/guard.yml@v0.1.0
    with:
      agent_ops_ref: v0.1.0
      # Flip on once AGENT_GH_TOKEN is set, to also verify referenced
      # secrets are provisioned + sane:
      run_secret_checks: false
    secrets: inherit
