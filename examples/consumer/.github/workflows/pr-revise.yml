name: pr-revise
# Dispatched by the review workflow when the review bot requests changes on an
# auto-agent PR. The file MUST be named pr-revise.yml (revise_dispatch.sh
# dispatches that workflow name) unless you set OLYMPUS_REVISE_WORKFLOW.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to revise
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  revise:
    uses: Netis/olympus/.github/workflows/revise.yml@v0.5.0
    with:
      pr_number: ${{ inputs.pr_number }}
      olympus_ref: v0.5.0
      runner_labels: '["self-hosted","my-runner"]'
    secrets: inherit
